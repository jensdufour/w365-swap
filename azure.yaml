# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mosaic
metadata:
  template: mosaic@0.1.0

hooks:
  preprovision:
    shell: pwsh
    run: ./scripts/entra-app.ps1
    interactive: true
    continueOnError: false
  postprovision:
    shell: pwsh
    run: ./scripts/post-provision.ps1
    interactive: false
    continueOnError: false

services:
  api:
    project: ./portal/api
    language: ts
    host: function
    hooks:
      prepackage:
        shell: pwsh
        run: npm run build

  web:
    project: ./portal/web
    language: ts
    host: staticwebapp
    dist: out
    hooks:
      prepackage:
        shell: pwsh
        run: |
          $tenantId = azd env get-value AZURE_TENANT_ID 2>$null
          $clientId = azd env get-value AZURE_CLIENT_ID 2>$null
          if ($clientId) {
            $envContent = @"
          NEXT_PUBLIC_AZURE_TENANT_ID=$tenantId
          NEXT_PUBLIC_AZURE_CLIENT_ID=$clientId
          NEXT_PUBLIC_API_BASE_URL=/api
          "@
            $envContent | Set-Content -Path ".env.production" -Encoding utf8
            Write-Host "Wrote .env.production with clientId=$clientId"
          }
          npm run build
